# nginx_local.conf
# 显式加载 Nginx TCP 转发 (stream) 动态模块
load_module /usr/lib/nginx/modules/ngx_stream_module.so;

# 独立的 PID 和日志路径，避免与系统全局默认的 Nginx 进程产生冲突
pid /tmp/nginx_local.pid;
error_log /tmp/nginx_local_error.log info;

events {
    worker_connections 1024;
}

stream {
    upstream chat_servers {
        least_conn; # 负载均衡策略：优先分配给当前连接数最少的节点
        server 127.0.0.1:8888 max_fails=3 fail_timeout=15s;
        server 127.0.0.1:8889 max_fails=3 fail_timeout=15s;
    }

    server {
        listen 8000; # 独立的 TCP 负载均衡端口
        proxy_pass chat_servers;
        proxy_timeout 10m;
        proxy_connect_timeout 5s;
    }
}
