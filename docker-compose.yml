version: '3.8'

services:
  # 1. MySQL 数据库服务
  mysql-chat:
    image: mysql:8.0
    container_name: mysql-chat
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
    ports:
      - "3307:3307" # 映射宿主机 3307 到容器内 3307
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro # 挂载初始化建表脚本
    command: --port=3307 --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --skip-name-resolve
    restart: always

  # 2. Redis 缓存服务
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always

  # 3. ChatServer 物理实例 1
  chatserver1:
    build:
      context: ./ChatServer
      dockerfile: Dockerfile
    container_name: chatserver1
    command: ["8888", "chatserver1"] # 传入参数：监听端口 8888，注册路由 IP/主机名为容器名 chatserver1
    environment:
      - MYSQL_HOST=mysql-chat
      - REDIS_HOST=redis
    depends_on:
      - mysql-chat
      - redis
    restart: always

  # 4. ChatServer 物理实例 2
  chatserver2:
    build:
      context: ./ChatServer
      dockerfile: Dockerfile
    container_name: chatserver2
    command: ["8889", "chatserver2"] # 传入参数：监听端口 8889，注册路由 IP/主机名为容器名 chatserver2
    environment:
      - MYSQL_HOST=mysql-chat
      - REDIS_HOST=redis
    depends_on:
      - mysql-chat
      - redis
    restart: always

  # 5. Nginx 四层负载均衡代理服务
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8000:8000" # 统一对公网暴露的 TCP 代理端口
    volumes:
      - ./ChatServer/nginx.conf:/etc/nginx/nginx.conf:ro # 挂载代理配置文件
    depends_on:
      - chatserver1
      - chatserver2
    restart: always

volumes:
  mysql_data:
  redis_data:
